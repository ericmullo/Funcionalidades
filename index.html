<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Cooperativa 15 de Abril</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      background: #f3f3e8;
      overflow: hidden;
    }

    .top-logo {
      position: absolute;
      top: 10px;
      left: 20px;
      width: 190px;
      height: 55px;
      border: none;
      background: rgb(238, 235, 235);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00783f;
      font-weight: bold;
      font-size: 13px;
      z-index: 10;
    }

    .main {
      width: 100%;
      height: 100vh;
      display: flex;
    }

    .left {
      width: 55%;
      background: linear-gradient(180deg, #004b24, #009144);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .welcome-box {
      margin-top: 80px;
    }

    .shield {
      font-size: 58px;
      opacity: 0.3;
      margin-bottom: 30px;
    }

    .welcome-box h2 {
      font-size: 24px;
      line-height: 1.4;
      font-weight: 500;
    }

    .welcome-box span {
      color: #ffd000;
      font-weight: bold;
    }

    .security-btn {
      margin-top: 35px;
      padding: 12px 32px;
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 30px;
      background: rgba(255,255,255,0.12);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .right {
      width: 45%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5e9;
    }

    .login-card {
      width: 520px;
      background: white;
      padding: 45px 35px 25px;
      box-shadow: 0 0 18px rgba(0,0,0,0.25);
      border-bottom: 6px solid #ffc400;
    }

    .logo-area {
      width: 280px;
      height: 95px;
      border: none;
      background: white;
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00783f;
      font-weight: bold;
      text-align: center;
    }

    .online {
      text-align: center;
      font-size: 42px;
      font-weight: bold;
      margin: 20px 0 30px;
    }

    .online .yellow {
      color: #ffc400;
    }

    .online .green {
      color: #009b4d;
    }

    .input-box {
      width: 100%;
      height: 60px;
      border: 1px solid #777;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      background: white;
      box-shadow: 0 3px 5px rgba(0,0,0,0.25);
    }

    .input-box input {
      flex: 1;
      border: none;
      outline: none;
      padding: 0 18px;
      font-size: 18px;
    }

    .icon {
      padding-right: 18px;
      font-size: 17px;
    }

    .login-btn {
      background: #00a84f;
      color: white;
      border: none;
      padding: 15px 28px;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 3px 5px rgba(0,0,0,0.3);
      cursor: pointer;
      margin-bottom: 25px;
    }

    .login-btn:hover {
      background: #008f43;
    }

    .links {
      font-size: 16px;
      line-height: 1.5;
    }

    .links a {
      color: #0074d9;
      text-decoration: underline;
    }
  </style>
</head>

<body>

 <div class="top-logo">
  <img src="coop.png" alt="Logo Coop" style="max-width:100%; max-height:100%;">
</div>

  <main class="main">

    <section class="left">
      <div class="welcome-box">
        <div class="shield">🛡️</div>

        <h2>
          Bienvenido al portal oficial de la<br>
          <span>Cooperativa 15 de Abril Ltda.</span><br>
          Ingresa con seguridad y confianza.
        </h2>

        <button class="security-btn">🛡 Ver guía de seguridad</button>
      </div>
    </section>

    <section class="right">
      <div class="login-card">

        <div class="logo-area">
  <img src="coop.png" alt="Logo Coop" style="max-width:90%; max-height:90%;">
</div>

        <div class="online">
          <span class="yellow">15</span><span class="green">online</span>
        </div>

        <div class="input-box">
          <input type="text" placeholder="Usuario">
          <span class="icon">👤</span>
        </div>

        <div class="input-box">
          <input type="password" placeholder="Clave">
          <span class="icon">👁</span>
        </div>

        <button class="login-btn" onclick="window.location.href='dashboard.html'">
  ↪ Acceder
</button>

        <div class="links">
          <p>Registrarse</p>
          <a href="#">¿Olvidaste tu contraseña o usuario?</a>
        </div>

      </div>
    </section>

  </main>

</body>
</html>
